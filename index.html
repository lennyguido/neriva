<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://docs.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; connect-src 'self' https://docs.google.com https://wa.me; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <title>NERIVA - Tu tienda online</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/gjz4jfm1/Neriva-Logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --green: #00ff41; --red: #ff3b3b; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        header { background: rgba(0,0,0,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,255,65,0.15); padding: 0 4%; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; height: 48px; }
        .header-logo { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 900; background: linear-gradient(135deg, var(--green) 0%, #00dd35 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; letter-spacing: 2px; }
        .header-actions { display: flex; gap: 0.4rem; }
        .header-cta { background: transparent; color: var(--green); border: 1.5px solid var(--green); padding: 0.4rem 0.7rem; border-radius: 3px; text-decoration: none; font-weight: 700; font-size: 0.7rem; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 0.2rem; }
        .header-cta.wa { background: rgba(37,211,102,0.1); border-color: #25d366; color: #25d366; }
        .hero { padding: 2.5rem 5% 1.8rem; text-align: center; background: radial-gradient(ellipse at 50% -10%, #0b2b0b 0%, #000 60%); }
        .hero h1 { font-family: 'Orbitron', monospace; font-size: clamp(1.8rem, 8vw, 3.2rem); font-weight: 900; background: linear-gradient(135deg, #fff 0%, var(--green) 60%, #00aa22 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; letter-spacing: clamp(2px, 2vw, 5px); }
        .hero p { font-size: 0.82rem; color: #666; margin-bottom: 1rem; max-width: 400px; margin-left: auto; margin-right: auto; }
        .hero-badges { display: flex; gap: 0.3rem; justify-content: center; flex-wrap: wrap; margin-bottom: 0.8rem; }
        .badge { background: rgba(0,255,65,0.04); border: 1px solid rgba(0,255,65,0.25); padding: 0.35rem 0.6rem; border-radius: 2px; font-size: 0.62rem; letter-spacing: 1px; text-transform: uppercase; color: var(--green); }
        .hero-cta-btn { display: inline-block; background: var(--green); color: #000; padding: 0.7rem 1.8rem; border-radius: 3px; text-decoration: none; font-weight: 800; font-size: 0.82rem; letter-spacing: 0.8px; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        .filters { padding: 0.7rem 4%; background: rgba(5,5,5,0.97); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 48px; z-index: 999; }
        .search-box { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,65,0.25); border-radius: 3px; padding: 0.75rem 1rem; color: #fff; font-size: 16px; }
        .filter-scroll { display: flex; gap: 0.4rem; overflow-x: auto; padding-bottom: 2px; }
        .filter-btn { flex-shrink: 0; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #aaa; padding: 0.45rem 0.85rem; border-radius: 3px; cursor: pointer; transition: all 0.2s; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
        .filter-btn.active { background: var(--green); color: #000; border-color: var(--green); }
        .productos-section { padding: 2rem 4%; }
        @media (min-width: 768px) { .productos-section { padding: 2.5rem 5%; max-width: 1400px; margin: 0 auto; } }
        .section-title { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; letter-spacing: 1.5px; color: var(--green); margin-bottom: 1.2rem; }
        .productos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        @media (min-width: 768px) { .productos-grid { gap: 1.2rem; } }
        .producto-card { background: linear-gradient(145deg, #0e0e0e 0%, #080808 100%); border-radius: 6px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); transition: border-color 0.2s, box-shadow 0.2s; -webkit-user-select: none; user-select: none; }
        .producto-card:active { transform: scale(0.98); border-color: rgba(0,255,65,0.5); }
        @media (hover: hover) { .producto-card:hover { box-shadow: 0 0 0 1px var(--green), 0 0 20px rgba(0,255,65,0.3), 0 15px 40px rgba(0,255,65,0.1); border-color: var(--green); } }
        .producto-imagen { width: 100%; aspect-ratio: 1/1; background: #050505; overflow: hidden; position: relative; }
        @media (min-width: 768px) { .producto-imagen { aspect-ratio: 4/3; } }
        .producto-imagen img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease, opacity 0.3s ease; }
        @media (hover: hover) { .producto-card:hover .producto-imagen img { transform: scale(1.06); } }
        .no-image { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: #0a0a0a; color: #333; }
        .badge-oferta { position: absolute; top: 8px; left: 8px; background: var(--red); color: #fff; font-size: 0.6rem; font-weight: 800; letter-spacing: 0.8px; padding: 0.2rem 0.5rem; border-radius: 2px; text-transform: uppercase; box-shadow: 0 0 10px rgba(255,59,59,0.4); animation: pulse-red 1.5s ease-in-out infinite; z-index: 2; }
        @keyframes pulse-red { 0%,100% { box-shadow: 0 0 8px rgba(255,59,59,0.4); } 50% { box-shadow: 0 0 18px rgba(255,59,59,0.4); } }
        /* NAVEGACIÓN DE FOTOS - SOLO VISIBLE SI HAY GALERÍA */
        .producto-foto-nav { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: none; gap: 4px; z-index: 3; }
        .producto-foto-nav.visible { display: flex; }
        .foto-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.5); transition: all 0.2s; cursor: pointer; }
        .foto-dot.active { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px rgba(0,255,65,0.6); }
        .producto-foto-prev, .producto-foto-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 4; transition: all 0.2s; font-size: 0.8rem; opacity: 0; }
        .producto-foto-prev.visible, .producto-foto-next.visible { display: flex; }
        .producto-foto-prev { left: 6px; }
        .producto-foto-next { right: 6px; }
        @media (hover: hover) { .producto-card:hover .producto-foto-prev.visible, .producto-card:hover .producto-foto-next.visible { opacity: 1; } }
        .producto-info { padding: 0.5rem; }
        @media (min-width: 768px) { .producto-info { padding: 1rem; } }
        .producto-categoria { color: var(--green); font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 0.2rem; font-weight: 700; }
        @media (min-width: 768px) { .producto-categoria { font-size: 0.6rem; letter-spacing: 1.5px; margin-bottom: 0.35rem; } }
        .producto-nombre { font-size: 0.65rem; font-weight: 700; margin-bottom: 0.3rem; color: #eee; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @media (min-width: 768px) { .producto-nombre { font-size: 0.95rem; margin-bottom: 0.6rem; } }
        .precio-wrapper { display: flex; align-items: baseline; gap: 0.2rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
        @media (min-width: 768px) { .precio-wrapper { gap: 0.4rem; margin-bottom: 0.7rem; } }
        .producto-precio { font-family: 'Orbitron', monospace; font-size: 0.8rem; font-weight: 900; color: var(--green); }
        @media (min-width: 768px) { .producto-precio { font-size: 1.2rem; } }
        .producto-precio-original { font-size: 0.55rem; color: #555; text-decoration: line-through; }
        .producto-descuento { font-size: 0.52rem; color: var(--red); font-weight: 700; }
        .btn-ver-mas { background: transparent; border: 1px solid rgba(0,255,65,0.35); color: var(--green); padding: 0.35rem 0.4rem; border-radius: 3px; display: block; font-weight: 700; font-size: 0.6rem; text-align: center; transition: all 0.2s; position: relative; overflow: hidden; }
        @media (min-width: 768px) { .btn-ver-mas { padding: 0.5rem 0.8rem; font-size: 0.7rem; } }
        .btn-ver-mas::before { content: ''; position: absolute; inset: 0; background: var(--green); transform: scaleX(0); transform-origin: left; transition: transform 0.25s ease; }
        @media (hover: hover) { .btn-ver-mas:hover::before { transform: scaleX(1); } .btn-ver-mas:hover { color: #000; } }
        .btn-ver-mas:active { background: var(--green); color: #000; transform: scale(0.97); }
        .btn-ver-mas span { position: relative; z-index: 1; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; }
        .modal.active { display: flex; align-items: flex-end; justify-content: center; }
        @media (min-width: 769px) { .modal.active { align-items: center; padding: 2rem; } }
        .modal-content { background: #111; border: 1px solid rgba(0,255,65,0.25); width: 100%; max-width: 1100px; border-radius: 12px 12px 0 0; max-height: 92vh; overflow-y: auto; }
        @media (min-width: 769px) { .modal-content { border-radius: 8px; max-height: 90vh; } }
        .modal-close { position: absolute; top: 0.8rem; right: 0.8rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; z-index: 10; }
        .modal-body { padding: 1rem 1.2rem 2rem; display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 769px) { .modal-body { padding: 2.5rem; grid-template-columns: 1fr 1fr; gap: 2.5rem; } }
        .modal-galeria { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); position: relative; display: flex; flex-direction: column; }
        @media (min-width: 769px) { .modal-galeria { aspect-ratio: unset; height: 400px; } }
        .modal-imagen-principal { width: 100%; height: 100%; position: relative; overflow: hidden; flex: 1; }
        .modal-imagen-principal img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .modal-thumbnails { display: flex; gap: 0.5rem; padding: 0.8rem; background: rgba(0,0,0,0.4); overflow-x: auto; }
        .modal-thumb { flex-shrink: 0; width: 60px; height: 60px; background: #0a0a0a; border: 2px solid rgba(0,255,65,0.3); border-radius: 4px; cursor: pointer; overflow: hidden; transition: all 0.2s; }
        .modal-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .modal-thumb.active { border-color: var(--green); box-shadow: 0 0 12px rgba(0,255,65,0.4); }
        .modal-info h2 { font-family: 'Orbitron', monospace; font-size: clamp(1.1rem, 5vw, 1.7rem); margin-bottom: 0.25rem; }
        .modal-categoria { color: var(--green); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.8rem; font-weight: 700; }
        .modal-precio { font-family: 'Orbitron', monospace; font-size: clamp(1.5rem, 7vw, 2.5rem); font-weight: 900; color: var(--green); }
        .btn-whatsapp { background: var(--green); color: #000; padding: 1rem 1.8rem; border-radius: 4px; text-decoration: none; display: block; font-weight: 800; font-size: 0.9rem; letter-spacing: 0.8px; text-align: center; box-shadow: 0 0 20px rgba(0,255,65,0.3); border: none; cursor: pointer; }
        .empty-state { text-align: center; padding: 3rem 2rem; color: #444; grid-column: 1 / -1; }
        footer { background: #030303; border-top: 1px solid rgba(0,255,65,0.12); padding: 2rem 5% 1.5rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <a href="#" class="header-logo">NERIVA</a>
    <div class="header-actions">
        <a href="https://wa.me/5491153386599" target="_blank" class="header-cta wa">💬 WA</a>
        <a href="#productos" class="header-cta">🛍️</a>
    </div>
</header>

<div class="hero">
    <h1>NERIVA</h1>
    <p>Los mejores productos al mejor precio</p>
    <div class="hero-badges">
        <div class="badge">Envío gratis</div>
        <div class="badge">Garantía</div>
    </div>
    <a href="#productos" class="hero-cta-btn">Ver productos</a>
</div>

<div class="filters">
    <input type="text" class="search-box" id="searchInput" placeholder="Buscar productos...">
    <div class="filter-scroll" id="filterButtons"></div>
</div>

<section class="productos-section" id="productos">
    <h2 class="section-title">Productos</h2>
    <div class="productos-grid" id="productosGrid">
        <div class="empty-state"><h3>Cargando...</h3></div>
    </div>
</section>

<div class="modal" id="productoModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">X</button>
        <div class="modal-body">
            <div class="modal-galeria">
                <div class="modal-imagen-principal" id="modalImagenPrincipal">
                    <img id="modalImgMain" src="" alt="Producto">
                </div>
                <div class="modal-thumbnails" id="modalThumbnails"></div>
            </div>
            <div class="modal-info">
                <p class="modal-categoria" id="modalCategoria"></p>
                <h2 id="modalNombre"></h2>
                <div class="modal-precio" id="modalPrecio"></div>
                <a href="#" class="btn-whatsapp" id="modalWhatsapp" target="_blank">💬 Comprar por WhatsApp</a>
            </div>
        </div>
    </div>
</div>

<footer>
    <div style="color:#444;font-size:0.8rem">© 2026 NERIVA — Todos los derechos reservados</div>
</footer>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/11cgwoDZwEC4KqjD-5dOHucJ2wsWvMK2QmDAYQDmXvyQ/gviz/tq?tqx=out:json';
const WA_NUMBER = '5491153386599';

let todosLosProductos = [];
let currentProductGaleria = [];

async function cargarProductos() {
    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));

        const productos = json.table.rows.map((r, i) => {
            const c = r.c || [];
            
            const nombre = c[0] ? String(c[0].v || '') : '';
            if (!nombre.trim()) return null;

            const categoria = c[1] ? String(c[1].v || '') : '';
            const precio = c[2] ? parseFloat(String(c[2].v || 0)) : 0;
            const descripcion = c[3] ? String(c[3].v || '') : '';
            const imagen = c[4] ? String(c[4].v || '') : '';
            const precioOferta = c[5] ? parseFloat(String(c[5].v || 0)) : null;

            // Fotos adicionales desde H+ (índice 7+)
            const fotosAdicionales = [];
            for (let j = 7; j < c.length; j++) {
                if (c[j] && c[j].v) {
                    fotosAdicionales.push(String(c[j].v));
                }
            }

            return {
                id: i + 1,
                nombre: nombre.trim(),
                categoria: categoria.trim(),
                precio: precio,
                descripcion: descripcion.trim(),
                imagen: imagen.trim(),
                precioOferta: precioOferta && precioOferta > 0 && precioOferta < precio ? precioOferta : null,
                fotosAdicionales: fotosAdicionales
            };
        }).filter(p => p !== null && p.precio > 0);

        todosLosProductos = productos;
        generarFiltros(productos);
        renderizarProductos(productos);
    } catch (err) {
        console.error('Error:', err);
        document.getElementById('productosGrid').innerHTML = '<div class="empty-state"><h3>Error al cargar</h3><p>Intenta más tarde</p></div>';
    }
}

function generarFiltros(productos) {
    const categorias = [...new Set(productos.map(p => p.categoria).filter(Boolean))].sort();
    const container = document.getElementById('filterButtons');
    container.innerHTML = '';

    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.textContent = 'Todos';
    btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderizarProductos(todosLosProductos);
    };
    container.appendChild(btn);

    categorias.forEach(cat => {
        const b = document.createElement('button');
        b.className = 'filter-btn';
        b.textContent = cat;
        b.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            renderizarProductos(todosLosProductos.filter(p => p.categoria === cat));
        };
        container.appendChild(b);
    });
}

function renderizarProductos(productos) {
    const grid = document.getElementById('productosGrid');
    grid.innerHTML = '';

    if (!productos.length) {
        grid.innerHTML = '<div class="empty-state"><h3>Sin resultados</h3></div>';
        return;
    }

    productos.forEach(p => {
        // 🎞️ IF: Solo mostrar navegación si hay fotos adicionales
        const tieneGaleria = p.fotosAdicionales && p.fotosAdicionales.length > 0;
        const fotosCard = p.imagen ? [p.imagen, ...p.fotosAdicionales] : p.fotosAdicionales;

        const card = document.createElement('div');
        card.className = 'producto-card';
        card.dataset.fotos = JSON.stringify(fotosCard);
        card.dataset.fotoActual = 0;

        // 🎞️ SOLO generar HTML de navegación si tieneGaleria === true
        const dotsHTML = tieneGaleria ? `
            <div class="producto-foto-nav visible">
                ${fotosCard.map((_, i) => `<div class="foto-dot${i === 0 ? ' active' : ''}" onclick="cambiarFoto(event, ${i})"></div>`).join('')}
            </div>
        ` : '';

        const navHTML = tieneGaleria ? `
            <button class="producto-foto-prev visible" onclick="cambiarFoto(event, -1)">❮</button>
            <button class="producto-foto-next visible" onclick="cambiarFoto(event, 1)">❯</button>
        ` : '';

        const precioMostrado = p.precioOferta || p.precio;
        const desc = p.precioOferta ? Math.round((1 - p.precioOferta / p.precio) * 100) : 0;

        card.innerHTML = `
            <div class="producto-imagen">
                ${p.imagen ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy" class="img-main">` : '<div class="no-image">📦</div>'}
                ${desc > 0 ? `<div class="badge-oferta">🔥 -${desc}%</div>` : ''}
                ${dotsHTML}
                ${navHTML}
            </div>
            <div class="producto-info">
                <div class="producto-categoria">${p.categoria}</div>
                <h3 class="producto-nombre">${p.nombre}</h3>
                <div class="precio-wrapper">
                    <div class="producto-precio">$${precioMostrado.toLocaleString('es-AR')}</div>
                    ${p.precioOferta ? `<div class="producto-precio-original">$${p.precio.toLocaleString('es-AR')}</div>` : ''}
                    ${desc > 0 ? `<div class="producto-descuento">-${desc}%</div>` : ''}
                </div>
                <span class="btn-ver-mas"><span>Ver detalles</span></span>
            </div>
        `;

        card.addEventListener('click', () => abrirModal(p, fotosCard));
        grid.appendChild(card);
    });
}

function cambiarFoto(event, direccion) {
    event.stopPropagation();
    const card = event.target.closest('.producto-card');
    const fotos = JSON.parse(card.dataset.fotos);
    let idx = parseInt(card.dataset.fotoActual);

    if (typeof direccion === 'number' && direccion >= 0) {
        idx = direccion;
    } else {
        idx = (idx + direccion + fotos.length) % fotos.length;
    }

    card.dataset.fotoActual = idx;
    card.querySelector('.img-main').src = fotos[idx];

    card.querySelectorAll('.foto-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
    });
}

function abrirModal(producto, fotos) {
    currentProductGaleria = fotos;
    
    document.getElementById('modalCategoria').textContent = producto.categoria;
    document.getElementById('modalNombre').textContent = producto.nombre;
    document.getElementById('modalPrecio').textContent = `$${(producto.precioOferta || producto.precio).toLocaleString('es-AR')}`;

    const mainImg = document.getElementById('modalImgMain');
    mainImg.src = fotos[0] || '';

    const thumbContainer = document.getElementById('modalThumbnails');
    thumbContainer.innerHTML = fotos.map((f, i) => `
        <div class="modal-thumb${i === 0 ? ' active' : ''}" onclick="cambiarFotoModal(${i})">
            <img src="${f}" loading="lazy">
        </div>
    `).join('');

    const msg = `Hola! Me interesa ${producto.nombre} - $${(producto.precioOferta || producto.precio).toLocaleString('es-AR')}`;
    document.getElementById('modalWhatsapp').href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;

    document.getElementById('productoModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function cambiarFotoModal(idx) {
    document.getElementById('modalImgMain').src = currentProductGaleria[idx];
    document.querySelectorAll('.modal-thumb').forEach((t, i) => {
        t.classList.toggle('active', i === idx);
    });
}

function closeModal() {
    document.getElementById('productoModal').classList.remove('active');
    document.body.style.overflow = '';
}

document.getElementById('searchInput').addEventListener('input', e => {
    const t = e.target.value.toLowerCase();
    renderizarProductos(todosLosProductos.filter(p =>
        p.nombre.toLowerCase().includes(t) ||
        p.categoria.toLowerCase().includes(t)
    ));
});

cargarProductos();
